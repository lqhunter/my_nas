services:
  media-server:
    build: .
    container_name: media-server
    ports:
      - "${PORT:-8080}:8000"
    volumes:
      - "${MEDIA_ROOT:-./media}:/media"
      - thumbnails:/tmp/thumbnails
    environment:
      - MEDIA_ROOT=/media
      - THUMBNAIL_DIR=/tmp/thumbnails
    restart: unless-stopped

volumes:
  thumbnails:
