services:
  media-server:
    build: .
    container_name: media-server
    ports:
      - "${PORT:-8080}:8000"
    volumes:
      - "${MEDIA_ROOT:-./media}:/media"
      - thumbnails:/tmp/thumbnails
      - ./config:/app/config
    environment:
      - MEDIA_ROOT=/media
      - THUMBNAIL_DIR=/tmp/thumbnails
    restart: unless-stopped

  quarkdrive:
    build: ./quarkdrive
    container_name: quarkdrive
    ports:
      - "${QUARKDRIVE_PORT:-8081}:8080"
    volumes:
      - quarkdrive_data:/data
    environment:
      - PORT=8080
      - QUARK_DATA_DIR=/data
    restart: unless-stopped

volumes:
  thumbnails:
  quarkdrive_data:
