<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夸克网盘</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="login-page" class="page hidden">
    <div class="login-container">
      <div class="login-header">
        <h1>夸克网盘</h1>
        <p>登录以管理您的夸克网盘文件</p>
      </div>
      <div class="login-methods">
        <div class="tab-bar">
          <button class="tab active" data-tab="cookie">Cookie登录</button>
          <button class="tab" data-tab="qr">扫码登录</button>
        </div>
        <div id="login-cookie" class="tab-content active">
          <div class="help-text">
            <p>在浏览器中登录 <a href="https://pan.quark.cn" target="_blank">pan.quark.cn</a>，按 F12 → 任意请求 → 复制 Cookie 值。</p>
          </div>
          <textarea id="cookie-input" rows="4" placeholder="粘贴 Cookie 字符串..."></textarea>
          <button id="btn-login-cookie" class="btn-primary">登录</button>
        </div>
        <div id="login-qr" class="tab-content">
          <div id="qr-display" class="qr-display">
            <p>点击获取二维码</p>
          </div>
          <button id="btn-get-qr" class="btn-primary">获取二维码</button>
          <p id="qr-status" class="qr-status"></p>
        </div>
      </div>
    </div>
  </div>

  <div id="main-page" class="page hidden">
    <header>
      <div class="header-left">
        <h2>夸克网盘</h2>
        <button id="btn-nav-up" class="btn-icon" title="上级目录">↑</button>
        <span id="current-path" class="path-display">/</span>
      </div>
      <div class="header-right">
        <span id="storage-info" class="storage-info"></span>
        <button id="btn-logout" class="btn-secondary">退出</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-left">
        <button id="btn-new-folder" class="btn-secondary">+ 新建文件夹</button>
        <button id="btn-refresh" class="btn-secondary">刷新</button>
      </div>
      <div class="toolbar-right">
        <input id="search-input" type="text" placeholder="搜索文件..." class="search-input">
        <button id="btn-search" class="btn-secondary">搜索</button>
      </div>
    </div>

    <div class="file-list-header">
      <span class="col-name">名称</span>
      <span class="col-size" data-sort="file_size">大小</span>
      <span class="col-date" data-sort="updated_at">修改时间</span>
      <span class="col-actions">操作</span>
    </div>
    <div id="file-list" class="file-list"></div>

    <div class="pagination">
      <button id="btn-prev" class="btn-secondary">上一页</button>
      <span id="page-info">第 1 页</span>
      <button id="btn-next" class="btn-secondary">下一页</button>
    </div>
  </div>

  <div id="player-overlay" class="overlay hidden">
    <div class="player-container">
      <div class="player-header">
        <span id="player-title">播放</span>
        <button id="btn-close-player" class="btn-icon">✕</button>
      </div>
      <video id="video-player" controls autoplay></video>
      <audio id="audio-player" controls></audio>
    </div>
  </div>

  <div id="modal-overlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span id="modal-title">操作</span>
        <button id="btn-close-modal" class="btn-icon">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
</div>
<script src="js/app.js"></script>
</body>
</html>
